<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detox Digital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;padding:16px}
h1{font-size:20px;margin-bottom:12px;color:#e94560}
.stat{margin-bottom:8px;font-size:14px}
.stat span{font-weight:bold;color:#0f3460}
.current-site{background:#16213e;padding:12px;border-radius:8px;margin-bottom:12px}
.current-site h3{font-size:14px;color:#e94560;margin-bottom:4px}
.current-site p{font-size:12px;color:#ccc}
.distracting{border-left:3px solid #e94560}
.safe{border-left:3px solid #2ecc71}
.btn{display:block;width:100%;padding:10px;background:#e94560;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-top:12px}
.btn:hover{background:#c73650}
.footer{margin-top:12px;font-size:11px;color:#666;text-align:center}
.loading{text-align:center;color:#888;padding:20px}
</style>
</head>
<body>
<h1>Detox Digital</h1>
<div id="currentSite" class="current-site loading">Carregando...</div>
<div class="stat">Sites distrativos monitorados: <span id="siteCount">0</span></div>
<div class="stat">Alertas hoje: <span id="alertCount">0</span></div>
<button class="btn" id="btnDashboard">Abrir Dashboard</button>
<div class="footer">Detox Digital v1.0</div>
<script src="popup.js"></script>
</body>
</html>
