<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard - Detox Digital')}"></head>
<body class="bg-dark text-white">
<nav th:replace="~{fragments/navbar :: navbar('dashboard')}"></nav>
<div class="container py-4">
  <h2 class="mb-4">Dashboard</h2>
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card bg-danger text-white"><div class="card-body text-center">
        <h6 class="card-title">Visitas Hoje</h6>
        <span id="totalVisits" class="display-6 fw-bold">0</span>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card bg-warning text-dark"><div class="card-body text-center">
        <h6 class="card-title">Alertas Disparados</h6>
        <span id="totalAlerts" class="display-6 fw-bold">0</span>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card bg-success text-white"><div class="card-body text-center">
        <h6 class="card-title">Sites Monitorados</h6>
        <span id="totalSites" class="display-6 fw-bold">0</span>
      </div></div>
    </div>
  </div>
  <div class="card bg-secondary text-white">
    <div class="card-header">
      <ul class="nav nav-tabs card-header-tabs">
        <li class="nav-item"><button class="nav-link active text-dark fw-bold" data-bs-toggle="tab" data-bs-target="#today">Hoje</button></li>
        <li class="nav-item"><button class="nav-link text-white" data-bs-toggle="tab" data-bs-target="#week">Semana</button></li>
      </ul>
    </div>
    <div class="card-body tab-content">
      <div class="tab-pane fade show active" id="today">
        <table class="table table-dark table-striped mb-0">
          <thead><tr><th>Site</th><th>Visitas</th><th>Tempo Total</th></tr></thead>
          <tbody id="todayBody"><tr><td colspan="3" class="text-center">Nenhum dado hoje</td></tr></tbody>
        </table>
      </div>
      <div class="tab-pane fade" id="week">
        <table class="table table-dark table-striped mb-0">
          <thead><tr><th>Site</th><th>Visitas</th><th>Tempo Total</th></tr></thead>
          <tbody id="weekBody"><tr><td colspan="3" class="text-center">Nenhum dado esta semana</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function formatTime(s){if(!s)return"0 min";const m=Math.floor(s/60),r=s%60;return m>0?m+"min "+r+"s":r+"s"}
function loadToday(){fetch('/api/stats/today').then(r=>r.json()).then(d=>{document.getElementById('totalVisits').textContent=d.totalVisits||0;document.getElementById('totalAlerts').textContent=d.alerts||0;document.getElementById('totalSites').textContent=d.sites?d.sites.length:0;if(d.sites&&d.sites.length>0){document.getElementById('todayBody').innerHTML=d.sites.map(s=>`<tr><td>${s.domain}</td><td>${s.visits}</td><td>${formatTime(s.totalSeconds)}</td></tr>`).join('')}})}
function loadWeek(){fetch('/api/stats/week').then(r=>r.json()).then(d=>{if(d.sites&&d.sites.length>0){document.getElementById('weekBody').innerHTML=d.sites.map(s=>`<tr><td>${s.domain}</td><td>${s.visits}</td><td>${formatTime(s.totalSeconds)}</td></tr>`).join('')}})}
loadToday();loadWeek();
</script>
</body>
</html>
