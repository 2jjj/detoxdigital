<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Detox Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Detox Digital</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/sites">Sites</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4">Dashboard de Foco</h2>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card bg-danger text-white">
                    <div class="card-body text-center">
                        <h6 class="card-title">Visitas Hoje</h6>
                        <span id="totalVisits" class="display-6 fw-bold">0</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark">
                    <div class="card-body text-center">
                        <h6 class="card-title">Alertas Disparados</h6>
                        <span id="totalAlerts" class="display-6 fw-bold">0</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body text-center">
                        <h6 class="card-title">Sites Monitorados</h6>
                        <span id="totalSites" class="display-6 fw-bold">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card bg-secondary text-white">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs">
                    <li class="nav-item">
                        <button class="nav-link active text-dark fw-bold" id="tabToday" data-bs-toggle="tab" data-bs-target="#today">Hoje</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link text-white" id="tabWeek" data-bs-toggle="tab" data-bs-target="#week">Semana</button>
                    </li>
                </ul>
            </div>
            <div class="card-body tab-content">
                <div class="tab-pane fade show active" id="today">
                    <table class="table table-dark table-striped mb-0">
                        <thead>
                            <tr>
                                <th>Site</th>
                                <th>Visitas</th>
                                <th>Tempo Total</th>
                            </tr>
                        </thead>
                        <tbody id="todayBody">
                            <tr><td colspan="3" class="text-center">Nenhum dado hoje</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="tab-pane fade" id="week">
                    <table class="table table-dark table-striped mb-0">
                        <thead>
                            <tr>
                                <th>Site</th>
                                <th>Visitas</th>
                                <th>Tempo Total</th>
                            </tr>
                        </thead>
                        <tbody id="weekBody">
                            <tr><td colspan="3" class="text-center">Nenhum dado esta semana</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatTime(seconds) {
            if (!seconds) return "0 min";
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins > 0 ? mins + "min " + secs + "s" : secs + "s";
        }

        function loadToday() {
            fetch('/api/stats/today')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('totalVisits').textContent = data.totalVisits || 0;
                    document.getElementById('totalAlerts').textContent = data.alerts || 0;
                    document.getElementById('totalSites').textContent = data.sites ? data.sites.length : 0;
                    const tbody = document.getElementById('todayBody');
                    if (data.sites && data.sites.length > 0) {
                        tbody.innerHTML = data.sites.map(s => `
                            <tr>
                                <td>${s.domain}</td>
                                <td>${s.visits}</td>
                                <td>${formatTime(s.totalSeconds)}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        function loadWeek() {
            fetch('/api/stats/week')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('weekBody');
                    if (data.sites && data.sites.length > 0) {
                        tbody.innerHTML = data.sites.map(s => `
                            <tr>
                                <td>${s.domain}</td>
                                <td>${s.visits}</td>
                                <td>${formatTime(s.totalSeconds)}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        loadToday();
        loadWeek();
    </script>
</body>
</html>
