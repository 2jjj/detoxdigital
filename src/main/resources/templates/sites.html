<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gerenciar Sites - Detox Digital')}"></head>
<body class="bg-dark text-white">
<nav th:replace="~{fragments/navbar :: navbar('sites')}"></nav>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Sites Monitorados</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ Adicionar</button>
  </div>
  <div class="card bg-secondary text-white">
    <div class="card-body p-0">
      <table class="table table-dark table-striped mb-0">
        <thead><tr><th>Dominio</th><th>Nome</th><th>Limite (min)</th><th>Ativo</th><th>Acoes</th></tr></thead>
        <tbody id="sitesBody"><tr><td colspan="5" class="text-center">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-secondary text-white">
      <div class="modal-header">
        <h5 class="modal-title">Adicionar Site</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Dominio</label><input type="text" id="inputDomain" class="form-control" placeholder="youtube.com"></div>
        <div class="mb-3"><label class="form-label">Nome</label><input type="text" id="inputName" class="form-control" placeholder="YouTube"></div>
        <div class="mb-3"><label class="form-label">Limite por sessao (minutos)</label><input type="number" id="inputLimit" class="form-control" value="15" min="1"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" id="btnSave">Salvar</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function loadSites(){fetch('/api/sites').then(r=>r.json()).then(sites=>{const t=document.getElementById('sitesBody');if(!sites.length){t.innerHTML='<tr><td colspan="5" class="text-center">Nenhum site cadastrado</td></tr>';return}t.innerHTML=sites.map(s=>`<tr><td>${s.domain}</td><td>${s.name}</td><td>${s.maxMinutesPerSession}</td><td>${s.active?'Sim':'Nao'}</td><td><button class="btn btn-sm btn-danger" onclick="deleteSite(${s.id})">Remover</button></td></tr>`).join('')})}
function deleteSite(id){if(!confirm('Remover este site?'))return;fetch('/api/sites/'+id,{method:'DELETE'}).then(()=>loadSites())}
document.getElementById('btnSave').addEventListener('click',function(){const d=document.getElementById('inputDomain').value.trim(),n=document.getElementById('inputName').value.trim(),l=parseInt(document.getElementById('inputLimit').value)||15;if(!d||!n)return alert('Preencha dominio e nome');fetch('/api/sites',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain:d,name:n,maxMinutesPerSession:l})}).then(r=>{if(r.ok){document.getElementById('inputDomain').value='';document.getElementById('inputName').value='';document.getElementById('inputLimit').value='15';bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();loadSites()}else{alert('Erro ao salvar')}})});
loadSites();
</script>
</body>
</html>
