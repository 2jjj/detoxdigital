<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Sites - Detox Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Detox Digital</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link active" href="/sites">Sites</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Sites Distractivos</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">+ Adicionar</button>
        </div>

        <div class="card bg-secondary text-white">
            <div class="card-body p-0">
                <table class="table table-dark table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Domínio</th>
                            <th>Nome</th>
                            <th>Limite (min)</th>
                            <th>Ativo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="sitesBody">
                        <tr><td colspan="5" class="text-center">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-secondary text-white">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar Site</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Domínio</label>
                        <input type="text" id="inputDomain" class="form-control" placeholder="youtube.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" id="inputName" class="form-control" placeholder="YouTube">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Limite por sessão (minutos)</label>
                        <input type="number" id="inputLimit" class="form-control" value="15" min="1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="btnSave">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadSites() {
            fetch('/api/sites')
                .then(r => r.json())
                .then(sites => {
                    const tbody = document.getElementById('sitesBody');
                    if (sites.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhum site cadastrado</td></tr>';
                        return;
                    }
                    tbody.innerHTML = sites.map(s => `
                        <tr>
                            <td>${s.domain}</td>
                            <td>${s.name}</td>
                            <td>${s.maxMinutesPerSession}</td>
                            <td>${s.active ? 'Sim' : 'Não'}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deleteSite(${s.id})">Remover</button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        function deleteSite(id) {
            if (!confirm('Remover este site?')) return;
            fetch('/api/sites/' + id, { method: 'DELETE' })
                .then(() => loadSites());
        }

        document.getElementById('btnSave').addEventListener('click', function() {
            const domain = document.getElementById('inputDomain').value.trim();
            const name = document.getElementById('inputName').value.trim();
            const limit = parseInt(document.getElementById('inputLimit').value) || 15;
            if (!domain || !name) return alert('Preencha domínio e nome');
            fetch('/api/sites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain, name, maxMinutesPerSession: limit })
            }).then(r => {
                if (r.ok) {
                    document.getElementById('inputDomain').value = '';
                    document.getElementById('inputName').value = '';
                    document.getElementById('inputLimit').value = '15';
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    loadSites();
                } else {
                    alert('Erro ao salvar');
                }
            });
        });

        loadSites();
    </script>
</body>
</html>
